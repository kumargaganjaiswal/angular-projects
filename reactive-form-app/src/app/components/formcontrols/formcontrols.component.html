<div class="form-container">
    <form>
        <div class="form-group">
            <label for="firstname">First Name</label>
            <input type="text" id="firstname" name="firstname" [formControl]="firstName">
            <div *ngIf="firstName.errors?.['required']">Name is required!</div>
            <div *ngIf="firstName.errors?.['minlength']">Minimum 3 characters</div>
        </div>
        <div class="form-group">
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" name="lastname" [formControl]="lastName">
            <div *ngIf="lastName.errors?.['userLastNameTaken']">Last Name already exists!</div>
        </div>
        <button type="button" (click)="update()">Set New Value</button>
        <br />
        <br />
        <button type="submit">Submit</button>

        <p>Value: {{ lastName.errors?.['userLastNameTaken']}}</p>
    </form>
</div>
