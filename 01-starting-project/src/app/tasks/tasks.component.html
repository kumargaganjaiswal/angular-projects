@if(isAddingTask) {
<app-new-taks (onCancelEvent)="onCancelDialog()" (onCreateNewTask)="onCreateNewTask($event)"></app-new-taks>
}
<section id="tasks">
    <header>
        <h2>{{name()}}'s Tasks</h2>
        <menu>
            <button (click)="onAddNewTask()">Add Task</button>
        </menu>
    </header>
    <ul>
        @for (task of selectedUserTasks; track task.id) {
        <li>
            <app-task [userTask]="task" (completedTask)="onCompletedTask($event)"></app-task>
        </li>
        }

    </ul>
</section>
